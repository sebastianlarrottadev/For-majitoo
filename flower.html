<script>
// Simple y directo
const h1 = document.getElementById('tituloAmor');
const texto = "Amor, Quiero que sepas que eres el amor de mi vida. No importa lo que pase ni las dificultades que se presenten, siempre voy a estar dispuesto a dar todo por nosotros y por ti. Eres la persona con la que quiero construir mi futuro, con la que sueño crecer, aprender y formar una familia. Te miro y solo puedo imaginarte siendo la mamá de mis hijos, compartiendo una vida llena de amor, apoyo y momentos que recordaremos siempre. Prometo cuidarte, respetarte y luchar cada día por lo que tenemos, porque para mí eres lo más importante. Gracias por existir y por hacer mi vida mucho más bonita. Puse esta canción porque eres el amor de mi vida y porque siempre me recuerda como la cantamos en los viajes, Te amo infinitamente.";

// Limpiar
h1.innerHTML = '';

// Crear spans para cada palabra
const palabras = texto.split(' ');
let htmlContent = '';

palabras.forEach((palabra, index) => {
    htmlContent += `<span style="opacity:0">${palabra}</span>`;
    if (index < palabras.length - 1) {
        htmlContent += ' ';
    }
});

h1.innerHTML = htmlContent;

// Obtener todos los spans
const spans = document.querySelectorAll('h1.titulo span');
let i = 0;

// Mostrar una por una
const intervalo = setInterval(() => {
    if (i < spans.length) {
        spans[i].style.opacity = '1';
        i++;
    } else {
        clearInterval(intervalo);
    }
}, 200);
</script>
